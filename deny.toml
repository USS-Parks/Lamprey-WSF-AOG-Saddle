# cargo-deny policy for the Saddle workspace.
#
# New advisories fail the build. The single bounded exception below covers the
# ML-DSA implementation already exercised by the workspace's signed-envelope,
# proof, revocation, and compliance tests. Its patched release is not semver
# compatible with the current cryptographic API, so that migration requires a
# dedicated compatibility and burn-in change rather than an incidental CI edit.

[advisories]
version = 2
ignore = [
    { id = "RUSTSEC-2025-0144", reason = "ml-dsa 0.0.4 has a timing side-channel during signing; the patched 0.1 line is API-incompatible. Migrate in a dedicated cryptographic compatibility and burn-in change." },
]

[bans]
# Duplicate transitive versions are reported for visibility. Yanked crates and
# unreviewed wildcard registry dependencies remain disallowed.
multiple-versions = "warn"
wildcards = "allow"

[licenses]
# Permit only the licenses in the current graph plus the proprietary license
# reference used by the workspace crates.
version = 2
allow = [
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "BSL-1.0",
    "CC0-1.0",
    "CDLA-Permissive-2.0",
    "ISC",
    "LicenseRef-Proprietary",
    "MIT",
    "MIT-0",
    "Unicode-3.0",
    "Zlib",
]
confidence-threshold = 0.93

[sources]
# Workspace path dependencies are exempt automatically; external dependencies
# must come from the crates.io index.
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
