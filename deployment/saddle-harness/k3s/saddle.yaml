# Saddle estate — k3s packaging. The SAME artifact set as the compose packaging
# (`../docker-compose.yml`): one `saddle-harness` image, two binaries (`saddled`,
# `saddle-noded`), the same environment contract, the same cluster-init script
# (mounted from a ConfigMap created from `../cluster-init.sh` — see
# `../gates/parity-compose-k3s.sh`). Only the orchestrator differs; nothing
# about the daemons or their configuration forks.
#
# k3s/k0s is an optional packaging of the estate for cluster customers — the
# Saddle control plane is the trust plane regardless of the substrate beneath it.
#
# Dev-harness posture (dev-mode OpenBao, unauthenticated admin API, explicit
# SADDLED_ALLOW_INSECURE_BIND opt-in on the pod network) — NOT production.
apiVersion: v1
kind: Namespace
metadata:
  name: saddle
---
# Dev-mode OpenBao, mirroring the compose service.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: openbao
  namespace: saddle
spec:
  replicas: 1
  selector:
    matchLabels: { app: openbao }
  template:
    metadata:
      labels: { app: openbao }
    spec:
      containers:
        - name: openbao
          # Same digest the compose packaging pins (AS-001).
          image: openbao/openbao@sha256:6150c4a6b62067db6141c8da7a6a6b5763f4f47c315343d0c848b40fecdfd452
          args:
            [
              "server",
              "-dev",
              "-dev-root-token-id=root",
              "-dev-listen-address=0.0.0.0:8200",
            ]
          securityContext:
            capabilities:
              add: ["IPC_LOCK"]
          ports:
            - containerPort: 8200
---
apiVersion: v1
kind: Service
metadata:
  name: openbao
  namespace: saddle
spec:
  selector: { app: openbao }
  ports:
    - port: 8200
      targetPort: 8200
---
# Headless service: stable per-voter DNS (cp-0.cp ... cp-4.cp), the k3s
# equivalent of the compose network's cp1..cp5 service names.
apiVersion: v1
kind: Service
metadata:
  name: cp
  namespace: saddle
spec:
  clusterIP: None
  selector: { app: saddled }
  ports:
    - port: 4600
      targetPort: 4600
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: cp
  namespace: saddle
spec:
  serviceName: cp
  replicas: 5
  podManagementPolicy: Parallel
  selector:
    matchLabels: { app: saddled }
  template:
    metadata:
      labels: { app: saddled }
    spec:
      containers:
        - name: saddled
          image: saddle-harness:vh4
          imagePullPolicy: Never # imported into the k3s containerd from the one artifact set
          # The compose packaging assigns SADDLED_NODE_ID / SADDLED_ADVERTISE per
          # service; here the identical values derive from the pod's stable
          # ordinal + DNS name. Packaging glue only — the env contract the
          # daemon reads is byte-for-byte the compose one.
          command: ["sh", "-c"]
          args:
            - |
              H="${HOSTNAME:-$(cat /proc/sys/kernel/hostname)}"
              export SADDLED_NODE_ID="$(( ${H##*-} + 1 ))"
              export SADDLED_ADVERTISE="http://${H}.cp:4600"
              exec /usr/local/bin/saddled
          env:
            - name: SADDLED_DATA_DIR
              value: /tmp/saddled
            - name: SADDLED_LISTEN
              value: 0.0.0.0:4600
            - name: SADDLED_PROFILE
              value: development
            - name: SADDLED_ALLOW_INSECURE_BIND
              value: "1"
          ports:
            - containerPort: 4600
          readinessProbe:
            httpGet: { path: /healthz, port: 4600 }
            periodSeconds: 2
            timeoutSeconds: 2
            failureThreshold: 40
---
# Forms the 5-voter cluster — the same script the compose packaging runs,
# pointed at the StatefulSet's DNS names via the address template.
apiVersion: batch/v1
kind: Job
metadata:
  name: cluster-init
  namespace: saddle
spec:
  backoffLimit: 4
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: cluster-init
          image: saddle-harness:vh4
          imagePullPolicy: Never
          command: ["sh", "-c", "tr -d '\\r' < /init/cluster-init.sh | sh"]
          env:
            - name: SADDLE_CP_ADDR_TEMPLATE
              value: http://cp-{ordinal}.cp:4600
          volumeMounts:
            - name: init
              mountPath: /init
      volumes:
        - name: init
          configMap:
            name: cluster-init
---
apiVersion: v1
kind: Service
metadata:
  name: edge
  namespace: saddle
spec:
  clusterIP: None
  selector: { app: saddle-noded }
  ports:
    - port: 5600
      targetPort: 5600
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: edge
  namespace: saddle
spec:
  serviceName: edge
  replicas: 5
  podManagementPolicy: Parallel
  selector:
    matchLabels: { app: saddle-noded }
  template:
    metadata:
      labels: { app: saddle-noded }
    spec:
      containers:
        - name: saddle-noded
          image: saddle-harness:vh4
          imagePullPolicy: Never
          command: ["/usr/local/bin/saddle-noded"]
          env:
            # The compose packaging names edges edge1..edge5; here the stable
            # pod name (edge-0..edge-4) is the node name. Same env contract.
            - name: SADDLE_NODE_NAME
              valueFrom:
                fieldRef: { fieldPath: metadata.name }
            - name: SADDLE_NODE_CONTROL_PLANE
              value: http://cp-0.cp:4600
            - name: SADDLE_NODE_LISTEN
              value: 0.0.0.0:5600
            - name: SADDLE_NODE_HEARTBEAT_SECS
              value: "2"
          ports:
            - containerPort: 5600
          readinessProbe:
            httpGet: { path: /healthz, port: 5600 }
            periodSeconds: 2
            timeoutSeconds: 2
            failureThreshold: 40
