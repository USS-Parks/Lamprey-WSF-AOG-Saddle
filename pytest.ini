[pytest]
# Keep temp dirs in opencode temp (known-writable in this environment).
# NOTE: Avoid setting a fixed `--basetemp` here. In some sandboxed Windows
# environments, pytest cannot clean up the same base temp directory between
# runs, which breaks `tmp_path` fixtures. Prefer passing a unique `--basetemp`
# per invocation when needed.

# Allow `async def test_*` without per-test markers.
asyncio_mode = auto

markers =
    e2e: end-to-end tests that spawn real binaries
