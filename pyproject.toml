[tool.ruff]
target-version = "py312"
line-length = 100

[tool.ruff.lint]
select = ["E", "F", "I", "N", "W", "UP", "ANN", "S", "B", "A", "COM", "C4", "ISC", "ICN", "PIE", "PT", "RSE", "RET", "SIM", "TID", "TCH", "ARG", "ERA", "PL", "TRY", "FLY", "PERF", "RUF"]
ignore = [
    "RSE102", "PLR2004", "RET505", "RET506", "SIM108", "SIM117",
    "PLC0415", "PERF401", "PERF402", "PLR0911", "PLR0913", "PLR1714",
    "ANN001", "ANN201", "ANN204", "ANN401",
    "S101", "S310",
    "TC001", "TC002", "TC003",
    "TRY003", "TRY300", "TRY400",
    "COM812",
    "ERA001",
    "W292",
    "SIM212",
]

[tool.ruff.lint.per-file-ignores]
# Test code: assert is the whole point; subprocess + hardcoded tokens
# + composite asserts are routine. These suppressions parallel the
# bandit [tool.bandit] block; see those comments for the rationale on
# each rule ID.
"**/tests/**/*.py" = [
    "S101",   # assert — pytest convention
    "S105",   # hardcoded password — test fixtures, header names
    "S603",   # subprocess without shell — invoking known binaries
    "S607",   # partial path — uses PATH lookup intentionally
    "S311",   # random not for security — non-crypto test IDs
    "PLW1510",  # subprocess.run without check — diagnostic, want raw rc
    "ANN202", # missing return type on private helper
    "ARG001", # unused fixture argument (pytest pattern)
    "ARG002", # unused method argument (pytest fixtures override)
    "PT018",  # composite assert — fine in tests
    "PT017",  # assertion in except — fine for narrow diagnostics
    "PT011",  # pytest.raises too broad — fine when exception type is
              # the only contract under test
    "N814",   # CamelCase imported as constant — test alias pattern
              # (`from collections.abc import Callable as _C`)
]

# Tools: scanner / packaging / burn-in scripts shell out to known
# binaries, contain long literal strings (rule descriptions, JSON
# snapshots, regex patterns) that exceed 100 cols by design, and
# carry their own non-pytest test trees that legitimately call
# subprocess / random.
"tools/**/*.py" = [
    "E501",   # long literal strings + rule descriptions
    "S603", "S607", "S311", "S105", "S104", "PLW1510",
    "ANN202", "ARG001", "ARG002", "PLW2901",
    "B007", "B905", "C416", "F841", "PERF102",
    "PLR0912", "PLR0915", "PLW3301", "PT006", "PT011", "PT017", "PT018",
    "RET504", "RUF007", "RUF034", "SIM102", "SIM110", "UP036",
]

# Top-level tests/ that aren't pytest test files (benchmarks, sdk
# integration scaffolds). Same rationale as tools/, narrower set.
"tests/**/*.py" = [
    "S603", "S607", "PLW1510",
    "ANN202", "ARG001", "ARG002",
    "PLR0912", "PLR0915", "PT017", "PT018",
]

# Top-level scripts/ contain operator-facing shell glue with long
# heredoc-style literals.
"scripts/**/*.py" = ["E501"]

[tool.bandit]
# J-10b: scope bandit to actionable signal. The skipped IDs are each
# either policy choices (stdlib-only urllib, asserts-as-invariants) or
# inherent to a tool tree that must shell out (subprocess in tools/).
# Real findings (B608 HTML/SQL false-positive, B104 negative-assertion
# test) carry explicit `# nosec` annotations at the call site.
#
# - B101 (assert_used): asserts are used pervasively for invariants
#   and tests; bandit cannot tell test from prod. Real prod secrets
#   are caught by gitleaks/detect-secrets.
# - B105 (hardcoded_password_string): pattern flags header names like
#   "X-IM-Auth-Token" and test fixture tokens. Real secrets are
#   covered by gitleaks/detect-secrets, not bandit.
# - B310 (urllib_urlopen): stdlib-only HTTP is the air-gap policy
#   per ARCHITECTURE.md; pulling `requests` is a regression.
# - B311 (random_not_for_security): used for non-crypto IDs in tests
#   and tools. Crypto code uses `secrets` / OS rng explicitly.
# - B404 (import_subprocess): tooling pre-flag for B603/B607; not a
#   finding on its own.
# - B603 (subprocess_without_shell): tools/ shells out to known
#   binaries (cargo, python, pytest, etc.) with full argv arrays.
# - B607 (start_process_with_partial_path): same as B603; PATH-based
#   resolution is intentional in tooling scripts.
exclude_dirs = ["target", "results", ".git", ".integrity/mcp-server/node_modules"]
skips = ["B101", "B105", "B310", "B311", "B404", "B603", "B607"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
# Resolve test modules by path so independent tooling suites cannot collide on
# generic package names such as `tests`.
addopts = "--import-mode=importlib"
markers = [
    "integration: requires a live Saddle, WSF, or AOG service",
    "live_backend: requires a reachable backend (optional by default)",
]
