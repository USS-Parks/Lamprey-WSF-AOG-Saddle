# Root-level Python tooling config.
# Ensures ruff/mypy apply consistent rules to ALL Python code (adapters/, mai-sdk-python/, etc.)
# The mai-sdk-python/pyproject.toml inherits from this via ruff's config resolution.

[tool.ruff]
target-version = "py312"
line-length = 100

[tool.ruff.lint]
select = [
    "E",   # pycodestyle errors
    "F",   # pyflakes
    "I",   # isort
    "N",   # pep8-naming
    "W",   # pycodestyle warnings
    "UP",  # pyupgrade
    "B",   # flake8-bugbear
    "A",   # flake8-builtins
    "COM", # flake8-commas
    "C4",  # flake8-comprehensions
    "ISC", # flake8-implicit-str-concat
    "PIE", # flake8-pie
    "PT",  # flake8-pytest-style
    "RSE", # flake8-raise
    "RET", # flake8-return
    "SIM", # flake8-simplify
    "TID", # flake8-tidy-imports
    "ARG", # flake8-unused-arguments
    "PL",  # pylint
    "PERF", # perflint
    "RUF", # ruff-specific
]
ignore = [
    "RSE102",  # Allow parentheses on raised exceptions (explicit instantiation)
    "PLR2004", # Allow magic values in comparisons (HTTP status codes, etc.)
    "RET505",  # Allow elif after return (clearer control flow)
    "RET506",  # Allow elif after raise (clearer error handling)
    "SIM108",  # Allow if/else over ternary (readability)
    "SIM117",  # Allow nested with statements (clearer mock setup)
    "PLC0415", # Allow non-top-level imports (test isolation)
    "PLC0207", # Allow extra split calls (clarity over micro-optimization)
    "PERF401", # Allow append in loop (async comprehension not always possible)
    "PERF402", # Allow list append pattern
    "PLR0911", # Allow many return statements (dispatch methods)
    "PLR0913", # Allow many function arguments (HTTP client methods)
    "PLR1714", # Allow separate comparisons over merged sets
]

[tool.ruff.lint.per-file-ignores]
"tests/**/*.py" = ["S101", "ARG001"]
"**/tests/**/*.py" = ["S101", "ARG001"]
# Adapter stubs are mostly empty __init__.py files
"adapters/**/__init__.py" = ["D104"]

[tool.mypy]
python_version = "3.12"
strict = true
warn_return_any = true
warn_unused_configs = true

[tool.pytest.ini_options]
asyncio_mode = "auto"
addopts = "--import-mode=importlib"
markers = [
    "integration: requires real MAI instance",
]
