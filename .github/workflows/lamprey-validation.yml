name: Lamprey MAI Validation

on:
  workflow_dispatch:
    inputs:
      suite:
        description: Validation suite to run
        required: true
        default: all
        type: choice
        options:
          - all
          - router
          - compliance
          - rust-workspace
          - python-ipc
          - python-trace-sim
          - burn-in
      runner:
        description: Runner lane
        required: true
        default: github-hosted
        type: choice
        options:
          - github-hosted
          - self-hosted-lamprey

permissions:
  contents: read
  actions: read

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  github-hosted:
    name: GitHub-hosted validation
    if: ${{ inputs.runner == 'github-hosted' }}
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - uses: Swatinem/rust-cache@v2

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install protobuf compiler
        run: choco install protoc --yes

      - name: Install Python validation dependencies
        run: python -m pip install --upgrade pip pytest pytest-asyncio

      - name: Run Lamprey validation
        shell: pwsh
        run: scripts\lamprey-validation.ps1 -Suite "${{ inputs.suite }}" -Output results\lamprey-validation

      - name: Publish summary
        if: always()
        shell: pwsh
        run: |
          if (Test-Path results\lamprey-validation\summary.md) {
            Get-Content results\lamprey-validation\summary.md | Add-Content $env:GITHUB_STEP_SUMMARY
          }

      - name: Upload validation artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lamprey-validation-${{ inputs.suite }}-${{ github.run_number }}
          path: results/lamprey-validation/

  self-hosted-lamprey:
    name: Self-hosted Lamprey validation
    if: ${{ inputs.runner == 'self-hosted-lamprey' }}
    runs-on: [self-hosted, Windows, lamprey]
    steps:
      - uses: actions/checkout@v4

      - name: Run Lamprey validation on local hardware
        shell: pwsh
        run: scripts\lamprey-validation.ps1 -Suite "${{ inputs.suite }}" -Output results\lamprey-validation

      - name: Publish summary
        if: always()
        shell: pwsh
        run: |
          if (Test-Path results\lamprey-validation\summary.md) {
            Get-Content results\lamprey-validation\summary.md | Add-Content $env:GITHUB_STEP_SUMMARY
          }

      - name: Upload validation artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lamprey-self-hosted-${{ inputs.suite }}-${{ github.run_number }}
          path: results/lamprey-validation/
