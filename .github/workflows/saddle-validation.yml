name: Saddle Workspace Validation

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      suite:
        description: Validation suite to run
        required: true
        default: all
        type: choice
        options:
          - all
          - quality-gates
          - core-policy
          - rust-workspace
          - integration
          - config-parse

permissions:
  contents: read
  actions: read

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  VALIDATION_SUITE: ${{ github.event_name == 'workflow_dispatch' && inputs.suite || 'all' }}

jobs:
  windows-validation:
    name: Windows validation
    runs-on: windows-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install protobuf compiler
        run: choco install protoc --yes
      - name: Add Git Unix tools to PATH
        shell: pwsh
        run: '"C:\Program Files\Git\usr\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append'
      - name: Run Saddle validation
        shell: pwsh
        run: scripts\saddle-validation.ps1 -Suite "$env:VALIDATION_SUITE" -Output results\saddle-validation
      - name: Publish summary
        if: always()
        shell: pwsh
        run: |
          if (Test-Path results\saddle-validation\summary.md) {
            Get-Content results\saddle-validation\summary.md | Add-Content $env:GITHUB_STEP_SUMMARY
          }
      - name: Upload validation artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: saddle-validation-${{ env.VALIDATION_SUITE }}-${{ github.run_number }}
          path: results/saddle-validation/
