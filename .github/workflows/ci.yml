name: Saddle CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  config-check:
    name: Config & DevOps Gates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - name: Verify lock-file parity
        run: bash scripts/verify-lock-parity.sh .
      - name: Security route-policy gate
        run: bash .integrity/scripts/route-policy-check.sh
      - name: Lint Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile
          config: .hadolint.yaml

  rust-check:
    name: Rust Quality Gates
    runs-on: ubuntu-latest
    env:
      CARGO_PROFILE_DEV_DEBUG: "0"
    steps:
      - uses: actions/checkout@v7
      - name: Free runner disk
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/hostedtoolcache/CodeQL /usr/share/swift
          df -h /
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
      - name: Install protobuf compiler
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler
      - name: Check compilation
        run: cargo check --workspace --all-targets --locked
      - name: Lint
        run: cargo clippy --workspace --all-targets --locked -- -D warnings -A clippy::pedantic
      - name: Format check
        run: cargo fmt --all --check
      - name: Unit and integration tests
        run: cargo test --workspace --locked
      - name: Verify no unsafe in mai-core
        run: |
          if grep -rnE '(^|[^A-Za-z0-9_])unsafe[[:space:]]*(\{|fn|impl|trait|extern)' mai-core/src/; then
            echo "ERROR: unsafe code found in mai-core"
            exit 1
          fi
          echo "OK: no unsafe in mai-core"

  advisories:
    name: Supply-Chain & Advisories
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install cargo-audit and cargo-deny
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit,cargo-deny
      - name: cargo audit
        run: cargo audit
      - name: cargo deny
        run: cargo deny check

  wsf-live:
    name: WSF/AOG/Saddle Live Trust Gates
    runs-on: ubuntu-latest
    needs: [rust-check]
    env:
      CARGO_PROFILE_DEV_DEBUG: "0"
    steps:
      - uses: actions/checkout@v7
      - name: Free runner disk
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/hostedtoolcache/CodeQL /usr/share/swift
          df -h /
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
      - name: Install protobuf compiler
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler
      - name: Start OpenBao
        run: |
          docker run -d --name openbao --cap-add=IPC_LOCK -p 8200:8200 \
            -e BAO_DEV_ROOT_TOKEN_ID=root -e BAO_DEV_LISTEN_ADDRESS=0.0.0.0:8200 \
            openbao/openbao:latest server -dev -dev-root-token-id=root
          for i in $(seq 1 30); do
            if curl -sf http://127.0.0.1:8200/v1/sys/seal-status | grep -q '"sealed":false'; then
              echo "OpenBao ready"
              exit 0
            fi
            sleep 1
          done
          docker logs openbao
          exit 1
      - name: Start Moto
        run: |
          docker run -d --name moto -p 5566:5000 motoserver/moto:latest
          for i in $(seq 1 20); do
            if curl -sf --max-time 3 http://127.0.0.1:5566/ >/dev/null 2>&1; then
              echo "Moto ready"
              exit 0
            fi
            sleep 1
          done
          docker logs moto
          exit 1
      - name: Install official gateway compatibility clients
        run: python3 -m pip install --disable-pip-version-check openai==2.45.0 anthropic==0.116.0
      - name: Run live trust and workload gates
        env:
          WSF_OPENBAO_ADDR: http://127.0.0.1:8200
          WSF_OPENBAO_TOKEN: root
          WSF_AWS_ENDPOINT: http://127.0.0.1:5566
        run: |
          cargo test -p wsf-bridge --test live_openbao -- --nocapture
          cargo test -p saddled --test live_openbao_anchor -- --nocapture
          cargo test -p wsf-broker --test live_localstack -- --nocapture
          cargo test -p wsf-broker --test live_gcp -- --nocapture
          cargo test -p wsf-broker --test live_azure -- --nocapture
          cargo test -p wsf-seal --test live_seal -- --nocapture
          cargo test -p wsf-ledger --test live_ledger -- --nocapture
          cargo test -p wsf-cache --test live_cache -- --nocapture
          cargo test -p wsf-tenants --test live_tenants -- --nocapture
          cargo test -p wsf-api --test live_api -- --nocapture
          cargo test -p aog-gateway --test live_gateway -- --nocapture
          cargo test -p aog-gateway --test kill_switch -- --nocapture
          cargo test -p aog-gateway --test openai_surface -- --nocapture
          cargo test -p aog-gateway --test anthropic_surface -- --nocapture
          cargo test -p aog-gateway --test policy_modes -- --nocapture
          cargo test -p aog-gateway --test metering -- --nocapture
          cargo test -p aog-gateway --test official_client_compat -- --nocapture
          cargo test -p saddle-controller --test sad33_aog_workloads -- --nocapture
          cargo test -p saddle-controller --test sad35_two_tenant_bridge --locked -- --nocapture

  saddle-live:
    name: Saddle Phase-V Live Gates
    runs-on: ubuntu-latest
    needs: [rust-check]
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v7
      - name: Build the 5+5 estate image
        run: docker build -f deployment/saddle-harness/Dockerfile -t saddle-harness:vh4 .
      - name: Bring up the estate
        run: docker compose -f deployment/saddle-harness/docker-compose.yml up -d --wait
      - name: V5 kill switch under scale
        run: bash deployment/saddle-harness/gates/v5-kill-switch-under-scale.sh
      - name: V8 scale
        run: bash deployment/saddle-harness/gates/v8-scale.sh
      - name: V10 revocation-to-denial SLO
        run: bash deployment/saddle-harness/gates/v10-revocation-slo.sh
      - name: V4 split-brain safety
        run: bash deployment/saddle-harness/gates/v4-split-brain.sh
      - name: V7 chaos and soak
        run: bash deployment/saddle-harness/gates/v7-chaos-soak.sh
      - name: Dump estate logs on failure
        if: failure()
        run: docker compose -f deployment/saddle-harness/docker-compose.yml logs --no-color --tail=300
      - name: Teardown
        if: always()
        run: docker compose -f deployment/saddle-harness/docker-compose.yml down -v

  repository-tools:
    name: Repository Tooling Gates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install test dependencies
        run: pip install pytest pytest-asyncio pyyaml
      - name: Compile active Python tooling
        run: python -m compileall -q deployment/appliance tools/packaging_tests tools/ci_surface_tests
      - name: Run deployment, packaging, and CI-contract tests
        run: pytest deployment/appliance/tests tools/packaging_tests tools/ci_surface_tests -v

  integration-ci:
    name: Saddle Integration Tests
    runs-on: ubuntu-latest
    needs: [rust-check]
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install protobuf compiler
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler
      - name: Core lifecycle
        run: cargo test -p mai-core --test integration_lifecycle --locked -- --nocapture
      - name: SAD-34 action authorization
        run: cargo test -p saddle-bridge --test sad34_action_gate --locked -- --nocapture

  conformance-ci:
    name: Saddle Contract & Conformance Tests
    runs-on: ubuntu-latest
    needs: [rust-check]
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install protobuf compiler
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler
      - name: Bridge contract properties
        run: cargo test -p saddle-bridge --test contract_properties --locked -- --nocapture
      - name: Saddle conformance suite
        run: cargo test -p saddle-conformance --locked -- --nocapture
      - name: SAD-41 consensus truth and fencing
        run: cargo test -p saddle-controller --test sad41_consensus_truth --locked -- --nocapture
