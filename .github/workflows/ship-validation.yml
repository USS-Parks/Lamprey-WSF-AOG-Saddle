name: Saddle Validation

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '30 3 * * *'
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  package-build-validate:
    name: Saddle Package Layout
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Stage the package layout without compiling release binaries
        run: ./scripts/build-package.sh --validate-only
      - name: Run package contract tests
        run: |
          pip install pytest pytest-asyncio
          pytest tools/packaging_tests -v

  compose-trust-validation:
    name: Compose Trust-Plane Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install validator dependencies
        run: pip install pyyaml pytest pytest-asyncio
      - name: Validate wsf-ha as production
        run: python deployment/appliance/validate_profile.py --profile production deployment/wsf-ha/docker-compose.yml
      - name: Validate appliance as demo
        run: python deployment/appliance/validate_profile.py --profile demo deployment/appliance/docker-compose.yml
      - name: Validate shadow as demo
        run: python deployment/appliance/validate_profile.py --profile demo deployment/shadow/docker-compose.yml
      - name: Run validator regression tests
        run: pytest deployment/appliance/tests -v

  repository-boundary:
    name: Saddle Repository Boundary
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v7
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: console/package-lock.json
      - uses: dtolnay/rust-toolchain@stable
      - name: Verify independent source boundary
        run: python tools/verify_saddle_independence.py --root . --evidence-output test-evidence/saddle/SAD-12/independence-gate.json --verify
      - name: Build CLI evidence dependency
        run: cargo build -p saddlectl --locked
      - name: Build console evidence dependency
        run: |
          npm ci --prefix console
          npm run build --prefix console
      - name: Verify active identity boundary
        run: python tools/verify_saddle_active_name_eradication.py --root . --evidence-output test-evidence/saddle/SAD-23/active-name-eradication-gate.json --verify
      - name: Verify SAD-40 declarative estate
        run: python tools/verify_sad40_declarative_estate.py --root . --evidence-output test-evidence/saddle/SAD-40/declarative-estate-gate.json --verify
      - name: Verify SAD-41 consensus truth and fencing
        run: python tools/verify_sad41_consensus_truth.py --root . --evidence-output test-evidence/saddle/SAD-41/consensus-truth-gate.json --verify
      - name: Verify SAD-42 level-triggered reconciliation
        run: python tools/verify_sad42_reconciliation.py --root . --evidence-output test-evidence/saddle/SAD-42/reconciliation-gate.json --verify
      - name: Verify SAD-43 professional scheduler
        run: python tools/verify_sad43_professional_scheduler.py --root . --evidence-output test-evidence/saddle/SAD-43/professional-scheduler-gate.json --verify
      - name: Run workflow contract tests
        run: |
          pip install pytest pytest-asyncio pyyaml
          pytest tools/ci_surface_tests -v

  nightly-integration:
    name: Nightly Integration Matrix
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 90
    needs: [package-build-validate, compose-trust-validation, repository-boundary]
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install protobuf compiler
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler
      - name: Install Python test dependencies
        run: pip install pytest pytest-asyncio pyyaml
      - name: Full Rust workspace test
        run: cargo test --workspace --locked -- --nocapture
      - name: Full active repository tooling test
        run: pytest deployment/appliance/tests tools/packaging_tests tools/ci_surface_tests -v
