# SHIP-12 forbidden-term scan config
#
# Lists production-forbidden symbols that must not leak into customer
# code paths. The scan is enforced by `scripts/ci_forbidden_terms.py`
# (invoked from `.github/workflows/ship-validation.yml`).
#
# SHIP-12 wires the gate. SHIP-16 is the final cleanup session that
# will physically remove these types and shrink every allowlist below
# to empty. Until SHIP-16, the allowlists capture every current
# occurrence in the tree so the scan is a no-op on main but blocks
# any NEW use of a forbidden term outside the listed files.
#
# Format:
#   [[term]]
#   name            = "<literal substring, case-sensitive>"
#   description     = "<why this is forbidden in production>"
#   allowed_paths   = ["<repo-relative path>", ...]
#   carried_forward = "SHIP-NN"  # session that will remove the last allowance

[scan]
roots = [
  "mai-api/src",
  "mai-core/src",
  "mai-compliance/src",
  "mai-router/src",
  "mai-scheduler/src",
  "mai-adapters/src",
  "mai-agent/src",
  "mai-vault/src",
  "mai-hil/src",
  "mai-sdk-rs/src",
]
extensions = [".rs", ".toml", ".py"]

[[term]]
name = "StubVault"
description = "Demo-safe in-memory vault. Production must build ZfsVault via mai_api::vault_builder::build_vault."
carried_forward = "SHIP-16"
allowed_paths = [
  "mai-api/src/lib.rs",
  "mai-api/src/production_guard.rs",
  "mai-api/src/server.rs",
  "mai-api/src/vault_builder.rs",
]

[[term]]
name = "MemoryAuditWriter"
description = "In-memory audit writer. Production must build WalAuditWriter via mai_api::audit_wal."
carried_forward = "SHIP-16"
allowed_paths = [
  "mai-api/src/audit.rs",
  "mai-api/src/audit_wal.rs",
  "mai-api/src/lib.rs",
  "mai-api/src/production_guard.rs",
  "mai-api/src/server.rs",
]

[[term]]
name = "AcceptAllBundleVerifier"
description = "Trust verifier that accepts every bundle. Production must build MlDsaBundleVerifier via mai_api::trust_builder."
carried_forward = "SHIP-16"
allowed_paths = [
  "mai-api/src/production_guard.rs",
  "mai-api/src/state.rs",
  "mai-api/src/trust_builder.rs",
  "mai-compliance/src/bundle.rs",
  "mai-compliance/src/lib.rs",
  "mai-compliance/src/trust_cache.rs",
]

[[term]]
name = "NullSealer"
description = "No-op audit sealer. Production must build AeadSealer via mai_api::sealer_builder."
carried_forward = "SHIP-16"
allowed_paths = [
  "mai-api/src/lib.rs",
  "mai-api/src/production_guard.rs",
  "mai-api/src/sealer_builder.rs",
  "mai-compliance/src/audit/api.rs",
  "mai-compliance/src/audit/mod.rs",
  "mai-compliance/src/audit/sealer.rs",
  "mai-compliance/src/audit/store.rs",
  "mai-compliance/src/lib.rs",
]

[[term]]
name = "dashboard-dev"
description = "Dashboard dev-mode flag. Production dashboards must use the signed compliance dashboard build."
carried_forward = "SHIP-16"
allowed_paths = [
  "mai-api/src/production_guard.rs",
]

[[term]]
name = "allow_demo_defaults"
description = "Profile flag that disables every production rejection. Production must set allow_demo_defaults = false."
carried_forward = "SHIP-16"
allowed_paths = [
  "mai-api/src/production_guard.rs",
  "mai-api/src/ship_profile.rs",
]
